<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" role="img" aria-labelledby="title desc">
  <title id="title">Biraj Oli website structure</title>
  <desc id="desc">Website architecture showing homepage, service pages, location pages, service-location pages, blog, about, contact, and internal linking relationships.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #fffdf8; }
      .card { stroke: #1e293b; stroke-width: 2; rx: 18; ry: 18; }
      .label { font-family: Arial, sans-serif; font-size: 20px; fill: #0f172a; text-anchor: middle; }
      .small { font-size: 16px; fill: #475569; }
      .title { font-family: Georgia, serif; font-size: 34px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .sub { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="860" />
  <text class="title" x="750" y="52">Biraj Oli Website Structure</text>
  <text class="sub" x="750" y="84">Total page count: 5,589</text>

  <rect class="card" x="580" y="110" width="340" height="90" fill="#dbeafe" />
  <text class="label" x="750" y="148">Homepage</text>
  <text class="label small" x="750" y="174">1 page</text>

  <rect class="card" x="70" y="280" width="360" height="110" fill="#dcfce7" />
  <text class="label" x="250" y="325">Service Pages</text>
  <text class="label small" x="250" y="352">146 pages</text>

  <rect class="card" x="500" y="280" width="360" height="110" fill="#fef3c7" />
  <text class="label" x="680" y="325">Location Pages</text>
  <text class="label small" x="680" y="352">37 pages</text>

  <rect class="card" x="930" y="280" width="500" height="110" fill="#fee2e2" />
  <text class="label" x="1180" y="325">Service x Location Pages</text>
  <text class="label small" x="1180" y="352">5,402 pages</text>

  <rect class="card" x="70" y="520" width="360" height="100" fill="#ede9fe" />
  <text class="label" x="250" y="560">Blog Section</text>
  <text class="label small" x="250" y="586">1 page</text>

  <rect class="card" x="500" y="520" width="360" height="100" fill="#cffafe" />
  <text class="label" x="680" y="560">About Page</text>
  <text class="label small" x="680" y="586">1 page</text>

  <rect class="card" x="930" y="520" width="500" height="100" fill="#e2e8f0" />
  <text class="label" x="1180" y="560">Contact Page</text>
  <text class="label small" x="1180" y="586">1 page</text>

  <path class="arrow" d="M750 200 L250 280" />
  <path class="arrow" d="M750 200 L680 280" />
  <path class="arrow" d="M750 200 L1180 280" />
  <path class="arrow" d="M750 200 L250 520" />
  <path class="arrow" d="M750 200 L680 520" />
  <path class="arrow" d="M750 200 L1180 520" />

  <path class="arrow" d="M430 335 L930 335" />
  <path class="arrow" d="M860 335 L930 335" />
  <path class="arrow" d="M1180 390 L1180 520" />
  <path class="arrow" d="M250 390 L250 520" />
  <path class="arrow" d="M680 390 L680 520" />
  <path class="arrow" d="M250 390 L1080 520" />
  <path class="arrow" d="M680 390 L1130 520" />

  <text class="sub" x="750" y="700">Internal linking relationships</text>
  <text class="small" x="750" y="735" text-anchor="middle">Homepage to all page types. Service and Location pages link to related Service x Location pages.</text>
  <text class="small" x="750" y="760" text-anchor="middle">Combination pages link back to parent Service and Location pages, plus Contact and Homepage.</text>
  <text class="small" x="750" y="785" text-anchor="middle">Blog, About, and Contact support authority, trust, and conversion across the site.</text>
</svg>
